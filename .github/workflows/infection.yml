name: infection

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  infection:
    runs-on: ubuntu-latest
    environment: Testing

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare Environment
        run: cp .env.example .env

      - name: Configure container user
        run: |
          echo "WWWUSER=$(id -u)" >> $GITHUB_ENV
          echo "WWWGROUP=$(id -g)" >> $GITHUB_ENV

      - name: Build App Container
        run: docker compose build app

      - name: Start Services
        run: docker compose up -d mysql mailpit

      - name: Install Composer Dependencies
        run: docker compose run --rm app composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate Application Key
        run: docker compose run --rm app php artisan key:generate

      - name: Install Node Dependencies
        run: docker compose run --rm app npm ci

      - name: Build Assets
        run: docker compose run --rm app npm run build

      - name: Run Infection
        run: docker compose run --rm app vendor/bin/infection --threads=1 --no-progress --git-diff-filter=AM --git-diff-base=origin/${{ github.base_ref || 'main' }}
