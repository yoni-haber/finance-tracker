name: build-verification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Testing
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Environment
        run: cp .env.example .env

      - name: Configure container user
        run: |
          echo "WWWUSER=$(id -u)" >> $GITHUB_ENV
          echo "WWWGROUP=$(id -g)" >> $GITHUB_ENV

      - name: Build PHP 8.5 Container
        run: docker compose build laravel.test

      - name: Install Composer Dependencies
        run: docker compose run --rm --no-deps laravel.test composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate Application Key
        run: docker compose run --rm --no-deps laravel.test php artisan key:generate

      - name: Install Node Dependencies
        run: docker compose run --rm --no-deps laravel.test npm ci

      - name: Verify Build
        run: docker compose run --rm --no-deps laravel.test npm run build
