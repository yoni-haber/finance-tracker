name: rector

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  rector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure container user
        run: |
          echo "WWWUSER=$(id -u)" >> $GITHUB_ENV
          echo "WWWGROUP=$(id -g)" >> $GITHUB_ENV

      - name: Build PHP 8.5 Container
        run: docker compose build laravel.test

      - name: Install Composer Dependencies
        run: docker compose run --rm --no-deps laravel.test composer install --no-interaction --prefer-dist --no-progress

      - name: Run Rector Dry Run
        run: docker compose run --rm --no-deps laravel.test vendor/bin/rector --dry-run
