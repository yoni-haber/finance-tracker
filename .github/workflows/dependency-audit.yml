name: dependency-audit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 1'

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure container user
        run: |
          echo "WWWUSER=$(id -u)" >> $GITHUB_ENV
          echo "WWWGROUP=$(id -g)" >> $GITHUB_ENV

      - name: Build App Container
        run: docker compose build app

      - name: Install Composer Dependencies
        run: docker compose run --rm --no-deps app composer install --no-interaction --prefer-dist --no-progress

      - name: Run Composer Audit
        run: docker compose run --rm --no-deps app composer audit

      - name: Install Node Dependencies
        run: docker compose run --rm --no-deps app npm ci

      - name: Run NPM Audit
        run: docker compose run --rm --no-deps app npm audit --audit-level=high
