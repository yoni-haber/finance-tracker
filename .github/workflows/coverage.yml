name: coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  coverage:
    runs-on: ubuntu-latest
    environment: Testing

    services:
      mysql:
        image: mysql:9.7.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: finance_tracker_testing
          MYSQL_USER: sail
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Tests With Coverage
        env:
          DB_HOST: 127.0.0.1
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_PHP=$(git diff --name-only --diff-filter=AM origin/${{ github.base_ref }} | grep '^app/.*\.php$' || true)
            if [ -z "$CHANGED_PHP" ]; then
              echo "No PHP source files changed, skipping coverage check."
              exit 0
            fi
            FILTER_ARGS=""
            while IFS= read -r file; do
              FILTER_ARGS="$FILTER_ARGS --coverage-filter $file"
            done <<< "$CHANGED_PHP"
            ./vendor/bin/phpunit --coverage-clover=coverage.xml --coverage-text $FILTER_ARGS
          else
            ./vendor/bin/phpunit --coverage-clover=coverage.xml --coverage-text
          fi

      - name: Enforce 100% Coverage
        if: github.event_name == 'pull_request'
        run: |
          php - << 'EOF'
          <?php
          if (!file_exists('coverage.xml')) {
              echo "No coverage.xml found (no PHP files changed).\n";
              exit(0);
          }
          $xml = simplexml_load_file('coverage.xml');
          $failed = false;
          foreach ($xml->project->file as $file) {
              $statements = (int) $file->metrics['statements'];
              if ($statements === 0) {
                  continue;
              }
              $covered = (int) $file->metrics['coveredstatements'];
              if ($covered < $statements) {
                  $pct = round($covered / $statements * 100, 1);
                  echo "NOT COVERED: " . $file['name'] . " ({$pct}%)\n";
                  $failed = true;
              }
          }
          if ($failed) {
              exit(1);
          }
          echo "All changed files have 100% line coverage.\n";
          EOF
